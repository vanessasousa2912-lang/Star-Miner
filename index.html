<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Relógio Pessoal - Produção</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --accent-color: #3b82f6;
            --border-color: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.8);
            --blob-color: #3b82f6;
        }

        .dark {
            --bg-color: #09090b;
            --text-color: #f4f4f5;
            --accent-color: #a78bfa;
            --border-color: #27272a;
            --card-bg: rgba(24, 24, 27, 0.8);
            --blob-color: #8b5cf6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        /* Lava Lamp */
        .lava-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            background: var(--blob-color);
            border-radius: 50%;
            animation: move linear infinite;
        }

        @keyframes move {
            from { transform: translateY(110vh) scale(1); }
            to { transform: translateY(-20vh) scale(1.3); }
        }

        /* Layout */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 24px;
            position: relative;
            z-index: 10;
        }

        .clock-text {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.05em;
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 700;
            margin: 1rem 0;
        }

        /* UI Elements */
        .btn-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        button {
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-color);
            padding: 8px;
            border-radius: 9999px;
            transition: all 0.2s;
        }

        button:hover { background: var(--card-bg); }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 32px;
            font-weight: 700;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-primary.paused { background-color: #ef4444; }

        /* Navigation */
        nav {
            width: 100%;
            max-width: 448px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            height: 80px;
            padding-bottom: 16px;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 8px;
            opacity: 0.5;
            background: none;
            border: none;
            font-size: 10px;
            font-weight: 700;
        }

        .nav-item.active {
            opacity: 1;
            color: var(--accent-color);
            border-top: 2px solid var(--accent-color);
            border-radius: 0;
        }

        /* Forms */
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            text-align: center;
        }

        .grid-timer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .hidden { display: none !important; }

        /* Alarm Overlay */
        #alarmOverlay {
            position: fixed;
            inset: 0;
            background: rgba(220, 38, 38, 0.9);
            backdrop-filter: blur(8px);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-bounce { animation: bounce 1s infinite; }

        .alarm-active { animation: flash 0.5s infinite alternate; }
        @keyframes flash {
            from { background-color: var(--bg-color); }
            to { background-color: rgba(239, 68, 68, 0.3); }
        }
    </style>
</head>
<body class="transition-colors">

    <div class="lava-container" id="lavaBackground"></div>

    <div class="btn-toggle">
        <button onclick="playAlarmSound(0.1, 880)" title="Testar Som">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M12 9v6m0 0l-3-3m3 3l3-3"/></svg>
        </button>
        <button id="themeToggle">
            <svg id="sunIcon" class="hidden" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
            <svg id="moonIcon" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.354 15.354A9 9 0 118.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
    </div>

    <div id="alarmOverlay" class="hidden">
        <h2 class="animate-bounce" style="font-size: 3rem; font-weight: 900; margin-bottom: 1rem;">TEMPO ESGOTADO!</h2>
        <button onclick="stopAlarm()" style="background: white; color: #dc2626; padding: 20px 40px; font-size: 1.5rem; font-weight: 900; border: none;">PARAR ALARME</button>
    </div>

    <main>
        <!-- Relógio -->
        <section id="view-clock">
            <div style="opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px;">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span id="locationText">Localizando...</span>
            </div>
            <h1 id="clock" class="clock-text">00:00:00</h1>
            <p id="date" style="text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.8;"></p>
        </section>

        <!-- Cronômetro -->
        <section id="view-stopwatch" class="hidden">
            <h1 id="stopwatchDisplay" class="clock-text">00:00.00</h1>
            <div style="display: flex; gap: 16px;">
                <button onclick="toggleStopwatch()" id="btnStopwatch" class="btn-primary">Iniciar</button>
                <button onclick="resetStopwatch()" class="btn-secondary" style="padding: 12px 32px;">Zerar</button>
            </div>
        </section>

        <!-- Timer -->
        <section id="view-timer" class="hidden">
            <div id="timerDisplay" class="clock-text" style="font-size: 4rem;">00:00:05:00</div>
            <div class="grid-timer">
                <div><label style="font-size: 10px; opacity: 0.5;">DIAS</label><input type="number" id="t-d" value="0"></div>
                <div><label style="font-size: 10px; opacity: 0.5;">HORAS</label><input type="number" id="t-h" value="0"></div>
                <div><label style="font-size: 10px; opacity: 0.5;">MIN</label><input type="number" id="t-m" value="5"></div>
                <div><label style="font-size: 10px; opacity: 0.5;">SEG</label><input type="number" id="t-s" value="0"></div>
            </div>
            <div style="display: flex; gap: 16px;">
                <button onclick="setAndToggleTimer()" id="btnTimer" class="btn-primary">Iniciar</button>
                <button onclick="resetTimer()" style="padding: 12px 32px;">Zerar</button>
            </div>
        </section>

        <!-- Evento -->
        <section id="view-event" class="hidden">
            <h2 style="font-size: 12px; letter-spacing: 0.2em; opacity: 0.6; margin-bottom: 8px;">CONTAGEM PARA</h2>
            <div id="eventDisplay" class="clock-text" style="font-size: 2.5rem; color: var(--accent-color);">00d 00h 00m 00s</div>
            <div class="card">
                <label style="display: block; text-align: left; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Data do Evento:</label>
                <input type="datetime-local" id="eventInput" style="margin-bottom: 16px;">
                <button onclick="startEventCountdown()" style="width: 100%; background: var(--text-color); color: var(--bg-color); padding: 12px; font-weight: 700; border: none; border-radius: 12px;">Marcar Evento</button>
            </div>
        </section>
    </main>

    <nav>
        <button onclick="switchTab('clock')" id="tab-clock" class="nav-item active">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span>RELÓGIO</span>
        </button>
        <button onclick="switchTab('stopwatch')" id="tab-stopwatch" class="nav-item">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            <span>CRONÔMETRO</span>
        </button>
        <button onclick="switchTab('timer')" id="tab-timer" class="nav-item">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span>TIMER</span>
        </button>
        <button onclick="switchTab('event')" id="tab-event" class="nav-item">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span>EVENTO</span>
        </button>
    </nav>

    <!-- Scripts do Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'relogio-producao';

        let currentUser = null;

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadUserData();
            }
        });

        window.saveUserData = async (data) => {
            if (!currentUser) return;
            const userDoc = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'prefs');
            await setDoc(userDoc, data, { merge: true });
        };

        async function loadUserData() {
            if (!currentUser) return;
            const userDoc = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'prefs');
            const snap = await getDoc(userDoc);
            if (snap.exists()) {
                const data = snap.data();
                if (data.darkMode) {
                    document.documentElement.classList.add('dark');
                    document.getElementById('sunIcon').classList.remove('hidden');
                    document.getElementById('moonIcon').classList.add('hidden');
                }
                if (data.eventDate) {
                    document.getElementById('eventInput').value = data.eventDate;
                    window.startEventCountdown(false);
                }
            }
        }
    </script>

    <script>
        // Audio Logic
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlarmSound(d = 0.5, f = 880) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + d);
        }

        let alarmInt;
        function triggerAlarm() {
            if (alarmInt) return;
            document.getElementById('alarmOverlay').classList.remove('hidden');
            document.body.classList.add('alarm-active');
            alarmInt = setInterval(() => playAlarmSound(0.4, 880), 500);
        }
        function stopAlarm() {
            clearInterval(alarmInt); alarmInt = null;
            document.getElementById('alarmOverlay').classList.add('hidden');
            document.body.classList.remove('alarm-active');
        }

        // Lava
        function createBlobs() {
            const container = document.getElementById('lavaBackground');
            for (let i = 0; i < 12; i++) {
                const b = document.createElement('div');
                b.className = 'blob';
                const s = Math.random() * 150 + 100 + 'px';
                b.style.width = b.style.height = s;
                b.style.left = Math.random() * 100 + 'vw';
                b.style.animationDuration = Math.random() * 20 + 10 + 's';
                b.style.animationDelay = Math.random() * -20 + 's';
                container.appendChild(b);
            }
        }
        createBlobs();

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR');
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        function switchTab(t) {
            ['clock', 'stopwatch', 'timer', 'event'].forEach(v => {
                document.getElementById('view-' + v).classList.add('hidden');
                document.getElementById('tab-' + v).classList.remove('active');
            });
            document.getElementById('view-' + t).classList.remove('hidden');
            document.getElementById('tab-' + t).classList.add('active');
        }

        // Stopwatch
        let swI, swT = 0, swR = false;
        function toggleStopwatch() {
            swR = !swR;
            const b = document.getElementById('btnStopwatch');
            if (swR) {
                b.textContent = 'Pausar'; b.classList.add('paused');
                swI = setInterval(() => { swT += 10; updateSWD(); }, 10);
            } else {
                b.textContent = 'Continuar'; b.classList.remove('paused');
                clearInterval(swI);
            }
        }
        function updateSWD() {
            const ms = Math.floor((swT % 1000) / 10);
            const s = Math.floor((swT / 1000) % 60);
            const m = Math.floor(swT / 60000);
            document.getElementById('stopwatchDisplay').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
        }
        function resetStopwatch() { clearInterval(swI); swT = 0; swR = false; updateSWD(); document.getElementById('btnStopwatch').textContent = 'Iniciar'; document.getElementById('btnStopwatch').classList.remove('paused'); }

        // Timer
        let tiI, tiS = 300, tiR = false;
        window.updateTimerDisplay = () => {
            let t = tiS;
            const d = Math.floor(t / 86400); t %= 86400;
            const h = Math.floor(t / 3600); t %= 3600;
            const m = Math.floor(t / 60); const s = t % 60;
            document.getElementById('timerDisplay').textContent = `${String(d).padStart(2, '0')}:${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        };
        function setAndToggleTimer() {
            if (!tiR) {
                const d = +document.getElementById('t-d').value, h = +document.getElementById('t-h').value, m = +document.getElementById('t-m').value, s = +document.getElementById('t-s').value;
                tiS = (d * 86400) + (h * 3600) + (m * 60) + s;
                if (tiS <= 0) return;
            }
            tiR = !tiR;
            const b = document.getElementById('btnTimer');
            if (tiR) {
                b.textContent = 'Pausar'; b.classList.add('paused');
                tiI = setInterval(() => { if (tiS > 0) { tiS--; window.updateTimerDisplay(); } else { clearInterval(tiI); triggerAlarm(); resetTimer(); } }, 1000);
            } else {
                b.textContent = 'Continuar'; b.classList.remove('paused');
                clearInterval(tiI);
            }
        }
        function resetTimer() { clearInterval(tiI); tiR = false; window.updateTimerDisplay(); document.getElementById('btnTimer').textContent = 'Iniciar'; document.getElementById('btnTimer').classList.remove('paused'); }

        // Event
        let evI;
        window.startEventCountdown = (save = true) => {
            clearInterval(evI);
            const val = document.getElementById('eventInput').value;
            if (!val) return;
            if (save && window.saveUserData) window.saveUserData({ eventDate: val });
            const target = new Date(val).getTime();
            evI = setInterval(() => {
                const diff = target - Date.now();
                if (diff < 0) { clearInterval(evI); document.getElementById('eventDisplay').textContent = "EVENTO CHEGOU!"; if (save) triggerAlarm(); return; }
                const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                document.getElementById('eventDisplay').textContent = `${d}d ${String(h).padStart(2, '0')}h ${String(m).padStart(2, '0')}m ${String(s).padStart(2, '0')}s`;
            }, 1000);
        };

        // Theme
        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
            if (window.saveUserData) window.saveUserData({ darkMode: isDark });
        };
    </script>
</body>
</html>
