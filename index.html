<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Miner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; cursor: crosshair; }
        canvas { display: block; }
        .ui-element { position: absolute; pointer-events: none; }
        #top-ui { top: 20px; left: 20px; width: calc(100% - 40px); display: none; }
        .stat-bar { width: 250px; height: 12px; background: #1a1a1a; border-radius: 6px; margin-bottom: 8px; overflow: hidden; border: 1px solid #333; }
        .bar-fill { height: 100%; transition: width 0.3s ease-out; }
        #xp-bar-container { width: 100%; height: 8px; background: #111; position: absolute; top: 0; left: 0; display: none; }
        #xp-fill { background: #eab308; width: 0%; }
        
        .modal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.98); padding: 2rem; border-radius: 1rem; 
            text-align: center; border: 2px solid #3b82f6; display: none; pointer-events: auto;
            min-width: 480px; box-shadow: 0 0 50px rgba(59, 130, 246, 0.3);
            z-index: 100;
        }

        #start-menu { display: block; }
        .diff-btn {
            width: 100%; padding: 1rem; margin: 0.5rem 0; border-radius: 0.5rem;
            font-weight: bold; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .diff-easy { background: #166534; }
        .diff-med { background: #1e3a8a; }
        .diff-hard { background: #991b1b; }
        .diff-insane { background: #4c1d95; animation: pulse-border 2s infinite; }

        @keyframes pulse-border {
            0% { border-color: #4c1d95; }
            50% { border-color: #a78bfa; }
            100% { border-color: #4c1d95; }
        }

        .upgrade-card {
            background: #1e1e2e; padding: 1.2rem; margin: 0.8rem 0; border-radius: 0.75rem;
            cursor: pointer; border: 2px solid #444; transition: all 0.2s;
            position: relative; overflow: hidden;
            pointer-events: auto;
        }
        .upgrade-card:hover { transform: scale(1.03); filter: brightness(1.2); }
        
        .rarity-common { border-color: #94a3b8; }
        .rarity-rare { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .rarity-legendary { border-color: #eab308; box-shadow: 0 0 25px rgba(234, 179, 8, 0.5); animation: glow 1.5s infinite alternate; }

        @keyframes glow {
            from { box-shadow: 0 0 10px #eab308; }
            to { box-shadow: 0 0 30px #eab308; }
        }

        .rarity-tag {
            position: absolute; top: 0; right: 0; padding: 2px 10px; font-size: 10px; font-weight: bold;
            text-transform: uppercase; border-bottom-left-radius: 8px;
        }

        .lang-btn {
            padding: 4px 10px; font-size: 12px; border: 1px solid #333; border-radius: 4px; cursor: pointer; opacity: 0.6;
        }
        .lang-btn.active { opacity: 1; border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>

    <div id="xp-bar-container"><div id="xp-fill"></div></div>

    <div id="start-menu" class="modal">
        <div class="flex justify-center gap-2 mb-6">
            <button onclick="setLanguage('pt')" id="lang-pt" class="lang-btn active">PT</button>
            <button onclick="setLanguage('en')" id="lang-en" class="lang-btn">EN</button>
            <button onclick="setLanguage('es')" id="lang-es" class="lang-btn">ES</button>
        </div>

        <h1 class="text-5xl font-black italic text-blue-500 mb-1" id="ui-title">MINERADOR ESTELAR</h1>
        <p class="text-gray-400 mb-6" id="ui-subtitle">Edição Relíquias & Raridades</p>
        
        <div class="space-y-2 mb-8">
            <button onclick="startGame('easy')" class="diff-btn diff-easy" id="btn-easy">Fácil</button>
            <button onclick="startGame('medium')" class="diff-btn diff-med" id="btn-med">Médio</button>
            <button onclick="startGame('hard')" class="diff-btn diff-hard" id="btn-hard">Difícil</button>
            <button onclick="startGame('impossible')" class="diff-btn diff-insane" id="btn-insane">Impossível</button>
        </div>

        <div class="border-t border-gray-800 pt-4 text-[10px] text-gray-500 uppercase tracking-widest">
            <p id="ui-credits">Ideias por Luis • Feito por Gemini</p>
        </div>
    </div>

    <div id="top-ui" class="ui-element">
        <div class="flex justify-between items-start">
            <div>
                <div class="text-xs mb-1" id="ui-health-label">INTEGRIDADE</div>
                <div class="stat-bar"><div id="health-fill" class="bar-fill" style="width: 100%; background: #ef4444;"></div></div>
                <div class="text-xs mb-1" id="ui-fuel-label">COMBUSTÍVEL</div>
                <div class="stat-bar"><div id="fuel-fill" class="bar-fill" style="width: 100%; background: #3b82f6;"></div></div>
                <div id="status-labels" class="flex gap-4 text-xs font-bold uppercase">
                    <span id="magnet-label" class="text-purple-400 opacity-0">Magneto Ativo</span>
                    <span id="laser-label" class="text-cyan-400 opacity-0">Laser Ativo</span>
                </div>
            </div>
            <div class="text-right">
                <div class="text-2xl font-bold italic" id="score-display">000000</div>
                <div class="text-yellow-500 font-bold"><span id="ui-lvl-label">NÍVEL</span> <span id="lvl-display">1</span></div>
                <div id="diff-tag" class="text-[10px] font-bold px-2 py-0.5 rounded inline-block mt-1"></div>
            </div>
        </div>
    </div>

    <div id="level-up-modal" class="modal">
        <h2 class="text-3xl font-black text-yellow-500 mb-2" id="ui-up-ready">UPGRADE DISPONÍVEL!</h2>
        <div id="upgrade-options"></div>
    </div>

    <div id="game-over-modal" class="modal">
        <h2 class="text-4xl font-black text-red-500 mb-2" id="ui-game-over">MISSÃO ENCERRADA</h2>
        <p id="death-reason" class="mb-4 text-gray-400"></p>
        <p class="text-2xl mb-6"><span id="ui-final-pts">PONTOS</span>: <span id="final-score">0</span></p>
        <button onclick="location.reload()" class="bg-white text-black px-8 py-3 rounded-full font-bold transition hover:bg-gray-200" id="btn-restart">RECOMECAR</button>
        <div class="mt-8 text-[10px] text-gray-600 uppercase tracking-tighter">
            Ideias por Luis • Feito por Gemini
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const translations = {
            pt: {
                title: "MINERADOR ESTELAR", subtitle: "Edição Relíquias & Raridades",
                easy: "Fácil", med: "Médio", hard: "Difícil", insane: "Impossível",
                credits: "Ideias por Luis • Feito por Gemini",
                health: "INTEGRIDADE", fuel: "COMBUSTÍVEL", mag: "Magneto Ativo", las: "Laser Ativo",
                lvl: "NÍVEL", up_ready: "UPGRADE DISPONÍVEL!", game_over: "MISSÃO ENCERRADA",
                final_pts: "PONTOS", restart: "RECOMEÇAR",
                death_hull: "Casco rompido. A nave foi destruída.",
                death_fuel: "Sem combustível para o suporte de vida.",
                rarity_com: "Comum", rarity_rare: "Raro", rarity_leg: "Lendário",
                up_hp_t: "Blindagem", up_hp_d: "Aumenta integridade máxima.",
                up_rep_t: "Auto-Reparo", up_rep_d: "Recupera integridade imediatamente.",
                up_las_t: "Foco Laser", up_las_d: "Aumenta dano do feixe.",
                up_fuel_t: "Célula Combustível", up_fuel_d: "Aumenta capacidade máxima.",
                up_mag_t: "Super Imã", up_mag_d: "Aumenta força e alcance do Magneto (Q).",
                up_eng_t: "Motores de Dobra", up_eng_d: "Melhora muito a aceleração.",
                up_eco_t: "Eco-Reator", up_eco_d: "Reduz consumo de combustível.",
                up_crit_t: "Lentes Críticas", up_crit_d: "Chance de dano dobrado no laser.",
                up_pass_t: "Coletor Passivo", up_pass_d: "Aumenta alcance do imã de cristais."
            },
            en: {
                title: "STAR MINER", subtitle: "Relics & Rarities Edition",
                easy: "Easy", med: "Medium", hard: "Hard", insane: "Impossible",
                credits: "Ideas by Luis • Made by Gemini",
                health: "HULL INTEGRITY", fuel: "FUEL LEVEL", mag: "Magnet Active", las: "Laser Active",
                lvl: "LEVEL", up_ready: "UPGRADE AVAILABLE!", game_over: "MISSION ENDED",
                final_pts: "SCORE", restart: "RESTART",
                death_hull: "Hull breached. Ship destroyed.",
                death_fuel: "Out of fuel. Life support offline.",
                rarity_com: "Common", rarity_rare: "Rare", rarity_leg: "Legendary",
                up_hp_t: "Armor Plating", up_hp_d: "Increases max hull integrity.",
                up_rep_t: "Auto-Repair", up_rep_d: "Instantly restores health.",
                up_las_t: "Laser Focus", up_las_d: "Increases beam damage.",
                up_fuel_t: "Fuel Cell", up_fuel_d: "Increases max fuel capacity.",
                up_mag_t: "Super Magnet", up_mag_d: "Increases Magnet power and range (Q).",
                up_eng_t: "Warp Engines", up_eng_d: "Greatly improves acceleration.",
                up_eco_t: "Eco-Reactor", up_eco_d: "Reduces fuel consumption.",
                up_crit_t: "Critical Lenses", up_crit_d: "Chance for double laser damage.",
                up_pass_t: "Passive Collector", up_pass_d: "Increases crystal magnet range."
            },
            es: {
                title: "MINERO ESTELAR", subtitle: "Edición Reliquias & Rarezas",
                easy: "Fácil", med: "Medio", hard: "Difícil", insane: "Imposible",
                credits: "Ideas por Luis • Hecho por Gemini",
                health: "INTEGRIDAD", fuel: "COMBUSTIBLE", mag: "Imán Activo", las: "Láser Activo",
                lvl: "NIVEL", up_ready: "¡MEJORA DISPONIBLE!", game_over: "MISIÓN FINALIZADA",
                final_pts: "PUNTOS", restart: "REINICIAR",
                death_hull: "Casco roto. La nave fue destruida.",
                death_fuel: "Sin combustible para el soporte vital.",
                rarity_com: "Común", rarity_rare: "Raro", rarity_leg: "Lendario",
                up_hp_t: "Blindaje", up_hp_d: "Aumenta integridad máxima.",
                up_rep_t: "Auto-Reparación", up_rep_d: "Recupera integridad ahora.",
                up_las_t: "Foco Láser", up_las_d: "Aumenta daño del haz.",
                up_fuel_t: "Célula de Combustible", up_fuel_d: "Aumenta capacidad máxima.",
                up_mag_t: "Super Imán", up_mag_d: "Aumenta fuerza y alcance del imán (Q).",
                up_eng_t: "Motores de Doble", up_eng_d: "Mejora mucho la aceleración.",
                up_eco_t: "Eco-Reactor", up_eco_d: "Reduce consumo de combustible.",
                up_crit_t: "Lentes Críticos", up_crit_d: "Probabilidad de doble daño.",
                up_pass_t: "Colector Pasivo", up_pass_d: "Aumenta alcance del imán de cristales."
            }
        };

        let currentLang = 'pt';

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            const t = translations[lang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-subtitle').innerText = t.subtitle;
            document.getElementById('btn-easy').innerText = t.easy;
            document.getElementById('btn-med').innerText = t.med;
            document.getElementById('btn-hard').innerText = t.hard;
            document.getElementById('btn-insane').innerText = t.insane;
            document.getElementById('ui-credits').innerText = t.credits;
            document.getElementById('ui-health-label').innerText = t.health;
            document.getElementById('ui-fuel-label').innerText = t.fuel;
            document.getElementById('magnet-label').innerText = t.mag;
            document.getElementById('laser-label').innerText = t.las;
            document.getElementById('ui-lvl-label').innerText = t.lvl;
            document.getElementById('ui-up-ready').innerText = t.up_ready;
            document.getElementById('ui-game-over').innerText = t.game_over;
            document.getElementById('ui-final-pts').innerText = t.final_pts;
            document.getElementById('btn-restart').innerText = t.restart;
        }

        const world = { width: 5000, height: 5000 };
        const camera = { x: 0, y: 0 };
        let gameState = 'menu';
        let score = 0;
        let level = 1;
        let xp = 0;
        let xpNext = 100;
        const keys = {};
        const mouse = { x: 0, y: 0, down: false };

        const stars = [];
        for(let i=0; i<400; i++) stars.push({ x: Math.random() * world.width, y: Math.random() * world.height, size: Math.random() * 2, parallax: 0.1 + Math.random() * 0.5, alpha: 0.2 + Math.random() * 0.8 });

        const stats = {
            maxHealth: 100, health: 100, maxFuel: 100, fuel: 100,
            accel: 0.18, rotationSpeed: 0.07, friction: 0.985,
            laserDamage: 0.3, laserWidth: 4, laserRange: 600,
            magnetRange: 350, magnetPower: 0.6, passiveMagnetRange: 100,
            armor: 0.1, fuelEfficiency: 1.0, critChance: 0.05,
            laserFuelCost: 0.1, passiveFuelCost: 0.015
        };

        const player = { x: world.width / 2, y: world.height / 2, vx: 0, vy: 0, angle: 0, radius: 18, magnetActive: false, laserActive: false, laserAngle: 0 };

        let asteroids = []; let enemies = []; let crystals = []; let particles = []; let bullets = [];

        const UPGRADE_TYPES = [
            { id: 'hp', langKey: 'up_hp', func: (m) => { stats.maxHealth += 25 * m; stats.health += 25 * m; } },
            { id: 'repair', langKey: 'up_rep', func: (m) => { stats.health = Math.min(stats.maxHealth, stats.health + 60 * m); } },
            { id: 'laser', langKey: 'up_las', func: (m) => { stats.laserDamage += 0.2 * m; } },
            { id: 'fuel', langKey: 'up_fuel', func: (m) => { stats.maxFuel += 50 * m; stats.fuel += 50 * m; } },
            { id: 'magnet', langKey: 'up_mag', func: (m) => { stats.magnetRange += 100 * m; stats.magnetPower += 0.3 * m; } },
            { id: 'engine', langKey: 'up_eng', func: (m) => { stats.accel += 0.08 * m; } },
            { id: 'eco', langKey: 'up_eco', func: (m) => { stats.fuelEfficiency *= (1 - 0.2 * m); } },
            { id: 'crit', langKey: 'up_crit', func: (m) => { stats.critChance += 0.1 * m; } },
            { id: 'passmag', langKey: 'up_pass', func: (m) => { stats.passiveMagnetRange += 80 * m; } }
        ];

        function startGame(difficulty) {
            const tag = document.getElementById('diff-tag');
            const t = translations[currentLang];
            if(difficulty === 'easy') { stats.maxHealth = 150; stats.health = 150; stats.fuelEfficiency = 0.6; stats.passiveMagnetRange = 200; tag.className += " bg-green-900"; tag.innerText=t.easy; }
            if(difficulty === 'medium') { tag.className += " bg-blue-900"; tag.innerText=t.med; }
            if(difficulty === 'hard') { stats.fuelEfficiency = 1.4; stats.armor = 0; tag.className += " bg-red-900"; tag.innerText=t.hard; }
            if(difficulty === 'impossible') { stats.maxHealth = 40; stats.health = 40; stats.fuelEfficiency = 2.5; tag.className += " bg-purple-900 animate-pulse"; tag.innerText=t.insane; }
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('top-ui').style.display = 'block';
            document.getElementById('xp-bar-container').style.display = 'block';
            gameState = 'playing';
            init();
        }

        function init() {
            window.addEventListener('resize', resize);
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
            window.addEventListener('mousedown', () => mouse.down = true);
            window.addEventListener('mouseup', () => mouse.down = false);
            resize();
            requestAnimationFrame(gameLoop);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        function update() {
            if(gameState !== 'playing') return;

            if(keys['KeyW'] || keys['ArrowUp']) {
                player.vx += Math.cos(player.angle) * stats.accel;
                player.vy += Math.sin(player.angle) * stats.accel;
                stats.fuel -= 0.04 * stats.fuelEfficiency;
                createParticle(player.x - Math.cos(player.angle)*15, player.y - Math.sin(player.angle)*15, '#f97316', 8, -player.vx*0.5, -player.vy*0.5);
            }
            if(keys['KeyA'] || keys['ArrowLeft']) player.angle -= stats.rotationSpeed;
            if(keys['KeyD'] || keys['ArrowRight']) player.angle += stats.rotationSpeed;

            player.x += player.vx; player.y += player.vy;
            player.vx *= stats.friction; player.vy *= stats.friction;
            stats.fuel -= stats.passiveFuelCost * stats.fuelEfficiency;

            player.magnetActive = keys['KeyQ'];
            player.laserActive = keys['KeyE'] || keys['Space'] || mouse.down;
            player.laserAngle = Math.atan2((mouse.y + camera.y) - player.y, (mouse.x + camera.x) - player.x);

            camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

            if(player.magnetActive) { stats.fuel -= 0.08; applyMagnet(); }
            if(player.laserActive) { stats.fuel -= stats.laserFuelCost; updateLaser(); }

            applyPassiveMagnet();
            updateEntities();
            checkCollisions();
            spawnLogic();
            updateUI();
        }

        function applyPassiveMagnet() {
            crystals.forEach(c => {
                const d = dist(player.x, player.y, c.x, c.y);
                if(d < stats.passiveMagnetRange) {
                    const ang = Math.atan2(player.y - c.y, player.x - c.x);
                    const force = 0.8;
                    c.vx += Math.cos(ang) * force; c.vy += Math.sin(ang) * force;
                    c.isAttracted = true;
                } else {
                    c.isAttracted = false;
                }
            });
        }

        function applyMagnet() {
            [...asteroids, ...crystals].forEach(obj => {
                const d = dist(player.x, player.y, obj.x, obj.y);
                if(d < stats.magnetRange) {
                    const ang = Math.atan2(player.y - obj.y, player.x - obj.x);
                    const force = stats.magnetPower * (1 - d/stats.magnetRange) * 2;
                    obj.vx += Math.cos(ang) * force; obj.vy += Math.sin(ang) * force;
                    obj.isAttractedManual = true;
                } else {
                    obj.isAttractedManual = false;
                }
            });
        }

        function updateLaser() {
            const endX = player.x + Math.cos(player.laserAngle) * stats.laserRange;
            const endY = player.y + Math.sin(player.laserAngle) * stats.laserRange;
            [...asteroids, ...enemies].forEach(obj => {
                const d = distToSegment({x:player.x, y:player.y}, {x:endX, y:endY}, obj);
                if(d < obj.r + stats.laserWidth) {
                    let dmg = stats.laserDamage;
                    if(Math.random() < stats.critChance) { dmg *= 2; createParticle(obj.x, obj.y, '#facc15', 10, 0, 0); }
                    obj.health -= dmg;
                    if(Math.random() > 0.6) createParticle(obj.x, obj.y, '#fff', 4, (Math.random()-0.5)*5, (Math.random()-0.5)*5);
                }
            });
        }

        function updateEntities() {
            asteroids.forEach(a => { a.x += a.vx; a.y += a.vy; a.rot += a.rotV; });
            asteroids.filter(a => a.health <= 0).forEach(a => { createExplosion(a.x, a.y, '#555', 12); score += 20; spawnCrystal(a.x, a.y); });
            asteroids = asteroids.filter(a => a.health > 0 && dist(player.x, player.y, a.x, a.y) < 2000);

            enemies.forEach(e => {
                const ang = Math.atan2(player.y - e.y, player.x - e.x);
                e.vx += Math.cos(ang) * 0.12; e.vy += Math.sin(ang) * 0.12;
                e.x += e.vx; e.y += e.vy; e.vx *= 0.97; e.vy *= 0.97;
                if(Date.now() - e.lastShot > 2000 && dist(player.x, player.y, e.x, e.y) < 600) {
                    bullets.push({x: e.x, y: e.y, vx: Math.cos(ang)*6, vy: Math.sin(ang)*6, damage: 10});
                    e.lastShot = Date.now();
                }
            });
            enemies.filter(e => e.health <= 0).forEach(e => { createExplosion(e.x, e.y, '#f00', 20); gainXP(150); spawnCrystal(e.x, e.y); });
            enemies = enemies.filter(e => e.health > 0);

            bullets.forEach(b => { 
                b.x += b.vx; b.y += b.vy; 
                if(dist(player.x, player.y, b.x, b.y) < player.radius) { takeDamage(b.damage); b.dead = true; } 
            });
            bullets = bullets.filter(b => !b.dead && dist(player.x, player.y, b.x, b.y) < 1500);

            crystals.forEach(c => { 
                c.x += c.vx; c.y += c.vy; c.vx *= 0.98; c.vy *= 0.98; 
                if(dist(player.x, player.y, c.x, c.y) < player.radius + 15) { 
                    c.collected = true; gainXP(40); stats.fuel = Math.min(stats.maxFuel, stats.fuel+12); 
                }
            });
            crystals = crystals.filter(c => !c.collected);

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; });
            particles = particles.filter(p => p.life > 0);
        }

        function checkCollisions() {
            asteroids.forEach(a => {
                const d = dist(player.x, player.y, a.x, a.y);
                if(d < player.radius + a.r) {
                    const impact = Math.sqrt((player.vx-a.vx)**2 + (player.vy-a.vy)**2);
                    if(impact > 1.5) takeDamage(impact * 4 * (1 - stats.armor));
                    const ang = Math.atan2(player.y - a.y, player.x - a.x);
                    const push = 4;
                    player.vx += Math.cos(ang)*push; player.vy += Math.sin(ang)*push;
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#020205'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if(gameState === 'menu') return;

            // Mira do Mouse
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 1; ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 12, 0, Math.PI*2); ctx.moveTo(mouse.x - 18, mouse.y); ctx.lineTo(mouse.x + 18, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - 18); ctx.lineTo(mouse.x, mouse.y + 18); ctx.stroke();

            ctx.save(); ctx.translate(-camera.x, -camera.y);

            stars.forEach(s => {
                ctx.globalAlpha = s.alpha; ctx.fillStyle = "white";
                let sx = (s.x - camera.x * s.parallax) % world.width; let sy = (s.y - camera.y * s.parallax) % world.height;
                if(sx < 0) sx += world.width; if(sy < 0) sy += world.height;
                ctx.fillRect(sx + camera.x, sy + camera.y, s.size, s.size);
            });
            ctx.globalAlpha = 1;

            // Desenhar Linhas de Magnetismo
            crystals.forEach(c => {
                if(c.isAttracted || c.isAttractedManual) {
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(c.x, c.y);
                    ctx.strokeStyle = c.isAttractedManual ? 'rgba(168, 85, 247, 0.4)' : 'rgba(59, 130, 246, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(c.x, c.y, 5, 0, Math.PI*2); ctx.fill();
            });

            bullets.forEach(b => { ctx.fillStyle = '#f44'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });
            
            asteroids.forEach(a => {
                if(a.isAttractedManual) {
                    ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(a.x, a.y);
                    ctx.strokeStyle = 'rgba(168, 85, 247, 0.2)'; ctx.lineWidth = 1; ctx.stroke();
                }
                ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.rot);
                ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
                ctx.beginPath(); for(let i=0; i<8; i++) { const ang = (i/8)*Math.PI*2; const r = a.r * (0.8 + Math.sin(i*a.seed)*0.2); ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r); }
                ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
            });

            enemies.forEach(e => {
                ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(Math.atan2(e.vy, e.vx));
                ctx.fillStyle = '#400'; ctx.strokeStyle = '#f00'; ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-10,10); ctx.lineTo(-10,-10); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.restore();
            });

            if(player.laserActive) {
                const endX = player.x + Math.cos(player.laserAngle)*stats.laserRange;
                const endY = player.y + Math.sin(player.laserAngle)*stats.laserRange;
                const gradient = ctx.createLinearGradient(player.x, player.y, endX, endY);
                gradient.addColorStop(0, '#22d3ee'); gradient.addColorStop(1, 'rgba(34, 211, 238, 0)');
                ctx.strokeStyle = gradient; ctx.lineWidth = stats.laserWidth;
                ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(endX, endY); ctx.stroke();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = stats.laserWidth/2;
                ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(endX, endY); ctx.stroke();
            }

            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
            ctx.globalAlpha = 1;

            // Jogador
            ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
            ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-12, 14); ctx.lineTo(-6, 0); ctx.lineTo(-12, -14); ctx.closePath(); ctx.fill();
            
            // Torreta
            ctx.rotate(player.laserAngle - player.angle);
            ctx.fillStyle = '#1e3a8a'; ctx.fillRect(-5, -3, 15, 6);
            ctx.restore();

            ctx.restore();
        }

        function spawnLogic() {
            if(asteroids.length < 60 && Math.random() < 0.06) {
                const ang = Math.random()*Math.PI*2; const d = 1100;
                asteroids.push({x: player.x+Math.cos(ang)*d, y: player.y+Math.sin(ang)*d, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, r: 25+Math.random()*30, health: 3 + level*0.5, rot: 0, rotV: (Math.random()-0.5)*0.04, seed: Math.random()});
            }
            if(enemies.length < 2 + Math.floor(level/2) && Math.random() < 0.006) {
                const ang = Math.random()*Math.PI*2; const d = 1300;
                enemies.push({x: player.x+Math.cos(ang)*d, y: player.y+Math.sin(ang)*d, vx:0, vy:0, health: 10 + level*5, r: 15, lastShot: 0});
            }
        }

        function startLevelUp() {
            gameState = 'leveling';
            const container = document.getElementById('upgrade-options');
            const t = translations[currentLang];
            container.innerHTML = '';
            
            // Sortear 3 upgrades únicos
            const shuffled = [...UPGRADE_TYPES].sort(() => 0.5 - Math.random());
            for(let i=0; i<3; i++) {
                const type = shuffled[i];
                const roll = Math.random();
                let rarity = 'common'; let mult = 1.0; let label = t.rarity_com; let color = 'rarity-common';
                
                if(roll > 0.94) { rarity = 'legendary'; mult = 2.5; label = t.rarity_leg; color = 'rarity-legendary'; }
                else if(roll > 0.8) { rarity = 'rare'; mult = 1.6; label = t.rarity_rare; color = 'rarity-rare'; }
                
                const card = document.createElement('div');
                card.className = `upgrade-card ${color}`;
                card.innerHTML = `<div class="rarity-tag ${color.replace('rarity-', 'bg-')}">${label}</div><div class="font-black text-lg uppercase">${t[type.langKey + '_t']}</div><div class="text-xs text-gray-400">${t[type.langKey + '_d']}</div><div class="text-[10px] mt-2 text-blue-400 font-bold">Bônus: x${mult.toFixed(1)}</div>`;
                card.onclick = () => { type.func(mult); gameState = 'playing'; document.getElementById('level-up-modal').style.display = 'none'; };
                container.appendChild(card);
            }
            document.getElementById('level-up-modal').style.display = 'block';
        }

        function gainXP(amt) { xp += amt; if(xp >= xpNext) { level++; xp = 0; xpNext *= 1.4; startLevelUp(); } }
        function takeDamage(amt) { stats.health -= amt; createExplosion(player.x, player.y, '#f00', 5); if(stats.health <= 0) endGame(translations[currentLang].death_hull); }
        
        function updateUI() {
            document.getElementById('health-fill').style.width = (Math.max(0, stats.health)/stats.maxHealth*100)+'%';
            document.getElementById('fuel-fill').style.width = (Math.max(0, stats.fuel)/stats.maxFuel*100)+'%';
            document.getElementById('xp-fill').style.width = (xp/xpNext*100)+'%';
            document.getElementById('score-display').innerText = Math.floor(score).toString().padStart(6,'0');
            document.getElementById('lvl-display').innerText = level;
            document.getElementById('magnet-label').style.opacity = player.magnetActive ? 1 : 0;
            document.getElementById('laser-label').style.opacity = player.laserActive ? 1 : 0;
            if(stats.fuel <= 0) endGame(translations[currentLang].death_fuel);
        }

        function endGame(reason) { gameState = 'over'; document.getElementById('death-reason').innerText = reason; document.getElementById('final-score').innerText = Math.floor(score); document.getElementById('game-over-modal').style.display = 'block'; }
        function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
        function distToSegment(p1, p2, obj) {
            const l2 = dist(p1.x, p1.y, p2.x, p2.y)**2; if(l2==0) return dist(obj.x, obj.y, p1.x, p1.y);
            let t = ((obj.x-p1.x)*(p2.x-p1.x) + (obj.y-p1.y)*(p2.y-p1.y))/l2; t = Math.max(0, Math.min(1, t));
            return dist(obj.x, obj.y, p1.x+t*(p2.x-p1.x), p1.y+t*(p2.y-p1.y));
        }
        function spawnCrystal(x, y) { crystals.push({x, y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, isAttracted: false, isAttractedManual: false}); }
        function createParticle(x, y, color, size, vx, vy) { particles.push({x, y, color, size: Math.random()*size, vx, vy, life:1}); }
        function createExplosion(x, y, color, n) { for(let i=0; i<n; i++) createParticle(x, y, color, 6, (Math.random()-0.5)*10, (Math.random()-0.5)*10); }
        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        draw();
    </script>
</body>
</html>
